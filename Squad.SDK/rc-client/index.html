<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SquadDash RC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: #2e2e3f;
      --accent: #7c6af5;
      --accent-hover: #9b8df9;
      --danger: #e05252;
      --text: #e8e8f0;
      --muted: #8888a0;
      --chat-user: #2d2b4e;
      --ptt-idle: #7c6af5;
      --ptt-active: #e05252;
      --ptt-busy: #555;
      --ptt-size: min(26vw, 120px);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
    }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
      flex-shrink: 0;
    }
    #status-dot.connected { background: #4caf50; }
    #status-dot.error     { background: var(--danger); }

    /* ── Activity icons (thinking 🧠 / tooling 🔨) ── */
    #activity-icons {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }
    .activity-slot {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .activity-icon {
      font-size: 18px;
      line-height: 1;
      opacity: 0.18;
      transition: opacity 0.2s;
    }
    .activity-icon.active {
      opacity: 1;
      animation: wobble 0.7s ease-in-out infinite;
    }
    .activity-timer {
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      min-width: 1.8em;
      display: none;
    }
    .activity-timer.visible { display: inline; }
    @keyframes wobble {
      0%, 100% { transform: rotate(0deg); }
      20%       { transform: rotate(-9deg); }
      60%       { transform: rotate(9deg); }
      80%       { transform: rotate(-4deg); }
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
      min-height: 0;
    }
    .msg {
      max-width: 88%;
      padding: 9px 13px;
      border-radius: 14px;
      line-height: 1.45;
      font-size: 14px;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user  { background: var(--chat-user);  align-self: flex-end;  border-bottom-right-radius: 3px; }
    .msg.agent { background: #1b2227; align-self: flex-start; border-bottom-left-radius: 3px; }
    .msg .role { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 3px; }
    .msg.agent .role { color: #7ec87e; }

    /* ── Quick reply buttons ── */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-self: flex-start;
      max-width: 90%;
      padding: 2px 0 4px;
    }
    .qr-btn {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 16px;
      color: var(--accent);
      padding: 6px 13px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .qr-btn:active, .qr-btn:hover { background: var(--accent); color: #fff; }

    /* ── Text input bar ── */
    #input-bar {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #text-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      padding: 9px 16px;
      font-size: 15px;
      outline: none;
    }
    #text-input:focus { border-color: var(--accent); }
    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: 20px;
      color: #fff;
      padding: 9px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    #send-btn:active { background: var(--accent-hover); }

    /* ── PTT area (compact) ── */
    #ptt-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #ptt-btn {
      width: var(--ptt-size);
      height: var(--ptt-size);
      border-radius: 50%;
      border: 3px solid transparent;
      background: var(--ptt-idle);
      color: #fff;
      font-size: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      touch-action: none;
    }
    #ptt-btn.active {
      background: var(--ptt-active);
      border-color: rgba(255,255,255,0.35);
      transform: scale(0.94);
      animation: pulse 0.9s infinite;
    }
    #ptt-btn.busy {
      background: var(--ptt-busy);
      cursor: not-allowed;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(224, 82, 82, 0.5); }
      50%       { box-shadow: 0 0 0 12px rgba(224, 82, 82, 0); }
    }

    #ptt-hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    #ptt-hint.busy-text { color: #f5a623; }

    /* ── Thinking indicator (dots in chat) ── */
    .thinking {
      align-self: flex-start;
      background: var(--chat-agent);
      border-radius: 14px 14px 3px 14px;
      padding: 9px 13px;
      color: var(--muted);
      font-size: 14px;
    }
    .dot-anim span {
      animation: blink 1.2s infinite;
      animation-fill-mode: both;
    }
    .dot-anim span:nth-child(2) { animation-delay: 0.2s; }
    .dot-anim span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity:0; } 40% { opacity:1; } }
  </style>
</head>
<body>

<header>
  <h1>SquadDash RC</h1>
  <div id="activity-icons">
    <div class="activity-slot">
      <span id="thinking-icon" class="activity-icon" title="Thinking…">🧠</span>
      <span id="thinking-timer" class="activity-timer"></span>
    </div>
    <div class="activity-slot">
      <span id="tool-icon" class="activity-icon" title="Running tools…">🔨</span>
      <span id="tool-timer" class="activity-timer"></span>
    </div>
  </div>
  <div id="status-dot" title="Disconnected"></div>
</header>

<div id="chat"></div>

<div id="input-bar">
  <input id="text-input" type="text" placeholder="Type a message…" autocomplete="off" />
  <button id="send-btn">Send</button>
</div>

<div id="ptt-area">
  <button id="ptt-btn" title="Hold to talk">🎤</button>
  <div id="ptt-hint">Hold to talk</div>
</div>

<script>
(function () {
  'use strict';

  // ── WebSocket connection ──────────────────────────────────────────────────
  const dot           = document.getElementById('status-dot');
  const chat          = document.getElementById('chat');
  const textInput     = document.getElementById('text-input');
  const sendBtn       = document.getElementById('send-btn');
  const pttBtn        = document.getElementById('ptt-btn');
  const pttHint       = document.getElementById('ptt-hint');
  const thinkingIcon  = document.getElementById('thinking-icon');
  const toolIcon      = document.getElementById('tool-icon');
  const thinkingTimer = document.getElementById('thinking-timer');
  const toolTimer     = document.getElementById('tool-timer');

  let ws = null;
  let wsReady = false;
  let isAiBusy = false;
  let activeToolCount = 0;

  let reconnectDelay = 1000;

  // ── Agent roster & current speaker ───────────────────────────────────────
  // handle → { displayName, accentHex }
  let agentRoster = {
    coordinator: { displayName: 'Coordinator', accentHex: '#3E63B8' }
  };
  let currentAgent = agentRoster.coordinator;

  function hexToHsl(hex) {
    let r = 0, g = 0, b = 0;
    const h = hex.replace('#', '');
    if (h.length === 6) {
      r = parseInt(h.slice(0,2),16)/255;
      g = parseInt(h.slice(2,4),16)/255;
      b = parseInt(h.slice(4,6),16)/255;
    }
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    let hue = 0, sat = 0;
    const light = (max+min)/2;
    if (max !== min) {
      const d = max - min;
      sat = light > 0.5 ? d/(2-max-min) : d/(max+min);
      switch(max) {
        case r: hue = ((g-b)/d + (g<b?6:0))/6; break;
        case g: hue = ((b-r)/d + 2)/6; break;
        case b: hue = ((r-g)/d + 4)/6; break;
      }
    }
    return [Math.round(hue*360), Math.round(sat*100), Math.round(light*100)];
  }

  function agentBubbleBg(accentHex) {
    const [h, s] = hexToHsl(accentHex);
    return `hsl(${h}, ${Math.round(s*0.45)}%, 14%)`;
  }

  function agentNameColor(accentHex) {
    const [h, s] = hexToHsl(accentHex);
    return `hsl(${h}, ${Math.min(100, Math.round(s*1.1))}%, 68%)`;
  }

  function applyAgentStyle(el, agent) {
    el.style.background = agentBubbleBg(agent.accentHex);
    const roleEl = el.querySelector('.role');
    if (roleEl) roleEl.style.color = agentNameColor(agent.accentHex);
  }

  // ── Activity timers ──────────────────────────────────────────────────────
  let thinkingStartMs = 0;
  let toolStartMs     = 0;
  let thinkingTicker  = null;
  let toolTicker      = null;

  function startActivityTimer(icon, timerEl, startRef, tickerRef, key) {
    icon.classList.add('active');
    if (key === 'thinking') {
      thinkingStartMs = Date.now();
      if (thinkingTicker) return;
      thinkingTicker = setInterval(() => {
        const secs = Math.floor((Date.now() - thinkingStartMs) / 1000);
        thinkingTimer.textContent = secs + 's';
        thinkingTimer.classList.add('visible');
      }, 1000);
    } else {
      if (toolStartMs === 0) toolStartMs = Date.now();
      if (toolTicker) return;
      toolTicker = setInterval(() => {
        const secs = Math.floor((Date.now() - toolStartMs) / 1000);
        toolTimer.textContent = secs + 's';
        toolTimer.classList.add('visible');
      }, 1000);
    }
  }

  function stopActivityTimer(icon, timerEl, key) {
    icon.classList.remove('active');
    if (key === 'thinking') {
      clearInterval(thinkingTicker);
      thinkingTicker = null;
      thinkingStartMs = 0;
      thinkingTimer.textContent = '';
      thinkingTimer.classList.remove('visible');
    } else {
      clearInterval(toolTicker);
      toolTicker = null;
      toolStartMs = 0;
      toolTimer.textContent = '';
      toolTimer.classList.remove('visible');
    }
  }

  function stopAllTimers() {
    stopActivityTimer(thinkingIcon, thinkingTimer, 'thinking');
    stopActivityTimer(toolIcon, toolTimer, 'tool');
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const token = new URLSearchParams(location.search).get('token');
    const wsUrl = token
      ? `${proto}://${location.host}?token=${encodeURIComponent(token)}`
      : `${proto}://${location.host}`;
    ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      wsReady = true;
      reconnectDelay = 1000;
      dot.className = 'connected';
      dot.title = 'Connected';
    };

    ws.onclose = ws.onerror = () => {
      wsReady = false;
      dot.className = 'error';
      dot.title = 'Disconnected';
      stopPtt();
      activeToolCount = 0;
      stopAllTimers();
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 16000);
    };

    ws.onmessage = (ev) => {
      if (typeof ev.data !== 'string') return;
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      handleServerMessage(msg);
    };
  }

  // ── Incoming message dispatch ─────────────────────────────────────────────
  let thinkingEl = null;

  function handleServerMessage(msg) {
    switch (msg.type) {
      // ── Bridge protocol events (correct names) ──
      case 'delta':
        // Streaming token from the agent
        appendToken(msg.content ?? '');
        break;
      case 'complete':
        // Final message — finalize streaming bubble with clean content
        finalizeMessage(msg.message?.role ?? 'agent', msg.message?.content ?? '');
        break;
      case 'history':
        // Full history on (re)connect
        if (Array.isArray(msg.messages)) {
          chat.innerHTML = '';
          streamingBubble = null;
          streamingRawText = '';
          activeToolCount = 0;
          stopAllTimers();
          msg.messages.forEach(m => appendChatFinal(m.role, m.content));
        }
        break;
      case 'tool_call':
        if (msg.status === 'running') {
          activeToolCount++;
          startActivityTimer(toolIcon, toolTimer, toolStartMs, toolTicker, 'tool');
        } else {
          activeToolCount = Math.max(0, activeToolCount - 1);
          if (activeToolCount === 0) stopActivityTimer(toolIcon, toolTimer, 'tool');
        }
        break;
      // ── Custom broadcast events ──
      case 'thinking_active':
        startActivityTimer(thinkingIcon, thinkingTimer, thinkingStartMs, thinkingTicker, 'thinking');
        break;
      case 'thinking_done':
        stopActivityTimer(thinkingIcon, thinkingTimer, 'thinking');
        break;
      case 'quick_replies':
        if (Array.isArray(msg.replies)) renderQuickReplies(msg.replies);
        break;
      case 'rc_status':
        setAiBusy(msg.status === 'busy');
        break;
      case 'agent_roster':
        if (Array.isArray(msg.agents)) {
          msg.agents.forEach(a => {
            if (a.handle && a.displayName && a.accentHex) {
              agentRoster[a.handle] = { displayName: a.displayName, accentHex: a.accentHex };
            }
          });
        }
        break;
      case 'agent_context':
        currentAgent = agentRoster[msg.handle] ?? {
          displayName: msg.displayName ?? msg.handle ?? 'Agent',
          accentHex: '#4472C4'
        };
        break;
    }
  }

  function setAiBusy(busy) {
    isAiBusy = busy;
    if (busy) {
      pttBtn.className = 'busy';
      pttHint.textContent = '⏳ AI is responding…';
      pttHint.className = 'busy-text';
      showThinking();
      stopPtt();
    } else {
      pttBtn.className = '';
      pttHint.textContent = 'Hold to talk';
      pttHint.className = '';
      removeThinking();
    }
  }

  // ── Chat rendering ────────────────────────────────────────────────────────
  let streamingBubble = null;
  let streamingRawText = '';

  const QR_MARKER = 'QUICK_REPLIES_JSON:';

  function visibleText(raw) {
    const idx = raw.indexOf(QR_MARKER);
    if (idx === -1) return raw;
    // strip from the newline before the marker (or just the marker) to end
    const cut = raw.lastIndexOf('\n', idx);
    return (cut >= 0 ? raw.slice(0, cut) : raw.slice(0, idx)).trimEnd();
  }

  /** Create a new fully-settled chat bubble (no streaming) */
  function appendChatFinal(role, content, agent) {
    streamingBubble = null;
    streamingRawText = '';
    const el = document.createElement('div');
    el.className = `msg ${role === 'user' ? 'user' : 'agent'}`;
    const roleLabel = document.createElement('div');
    roleLabel.className = 'role';
    if (role === 'user') {
      roleLabel.textContent = 'You';
    } else {
      const agt = agent ?? currentAgent;
      const firstName = agt.displayName.split(' ')[0];
      roleLabel.textContent = firstName;
      el.style.background = agentBubbleBg(agt.accentHex);
      roleLabel.style.color = agentNameColor(agt.accentHex);
    }
    el.appendChild(roleLabel);
    const text = document.createElement('span');
    text.textContent = content;
    el.appendChild(text);
    chat.appendChild(el);
    scrollToBottom();
  }

  /** Append a streaming token — creates or updates the live bubble */
  function appendToken(token) {
    removeThinking();
    streamingRawText += token;
    const display = visibleText(streamingRawText);
    if (!streamingBubble) {
      const agt = currentAgent;
      streamingBubble = document.createElement('div');
      streamingBubble.className = 'msg agent';
      streamingBubble.style.background = agentBubbleBg(agt.accentHex);
      const roleLabel = document.createElement('div');
      roleLabel.className = 'role';
      roleLabel.textContent = agt.displayName.split(' ')[0];
      roleLabel.style.color = agentNameColor(agt.accentHex);
      streamingBubble.appendChild(roleLabel);
      const span = document.createElement('span');
      streamingBubble.appendChild(span);
      chat.appendChild(streamingBubble);
    }
    streamingBubble.querySelector('span').textContent = display;
    scrollToBottom();
  }

  /** Finalize the streaming bubble with the authoritative clean content from 'complete' */
  function finalizeMessage(role, content) {
    if (streamingBubble) {
      streamingBubble.querySelector('span').textContent = content;
      streamingBubble = null;
      streamingRawText = '';
    } else if (content) {
      appendChatFinal(role, content);
    }
    scrollToBottom();
  }

  /** Render quick reply buttons below the last message */
  function renderQuickReplies(replies) {
    if (!replies.length) return;
    const container = document.createElement('div');
    container.className = 'quick-replies';
    replies.forEach(r => {
      const btn = document.createElement('button');
      btn.className = 'qr-btn';
      btn.textContent = r.label;
      btn.addEventListener('click', () => {
        if (!wsReady) return;
        ws.send(JSON.stringify({ type: 'prompt', text: r.label }));
        appendChatFinal('user', r.label);
        container.remove();
      });
      container.appendChild(btn);
    });
    chat.appendChild(container);
    scrollToBottom();
  }

  function showThinking() {
    if (thinkingEl) return;
    thinkingEl = document.createElement('div');
    thinkingEl.className = 'thinking dot-anim';
    thinkingEl.innerHTML = '<span>●</span><span>●</span><span>●</span>';
    chat.appendChild(thinkingEl);
    scrollToBottom();
  }

  function removeThinking() {
    if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
  }

  function scrollToBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  // ── Text input ────────────────────────────────────────────────────────────
  function sendText() {
    const text = textInput.value.trim();
    if (!text || !wsReady) return;
    ws.send(JSON.stringify({ type: 'prompt', text }));
    appendChatFinal('user', text);
    textInput.value = '';
  }

  sendBtn.addEventListener('click', sendText);
  textInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });

  // ── PTT / Audio ───────────────────────────────────────────────────────────
  let audioContext   = null;
  let workletNode    = null;
  let sourceNode     = null;
  let mediaStream    = null;
  let isPttActive    = false;
  let audioStartSent = false;

  function showPttError(msg) {
    pttBtn.className = '';
    pttHint.textContent = msg;
    pttHint.className = 'busy-text';
    setTimeout(() => {
      if (!isAiBusy) {
        pttHint.textContent = 'Hold to talk';
        pttHint.className = '';
      }
    }, 3500);
  }

  async function startPtt() {
    if (isPttActive || isAiBusy || !wsReady) return;

    if (!window.isSecureContext || !navigator.mediaDevices) {
      showPttError('⚠️ Mic needs HTTPS — use a tunnel');
      return;
    }

    isPttActive    = true;
    audioStartSent = false;
    pttBtn.className = 'active';
    pttHint.textContent = '🔴 Recording…';

    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: {
        channelCount: 1,
        sampleRate: { ideal: 16000 },
        echoCancellation: true,
        noiseSuppression: true,
      }, video: false });

      audioContext = new AudioContext();
      await audioContext.audioWorklet.addModule('audio-processor.js');

      workletNode = new AudioWorkletNode(audioContext, 'pcm-capture-processor');
      workletNode.port.onmessage = (ev) => {
        if (wsReady && isPttActive) {
          ws.send(ev.data);
        }
      };

      sourceNode = audioContext.createMediaStreamSource(mediaStream);
      sourceNode.connect(workletNode);
      workletNode.connect(audioContext.destination);

      ws.send(JSON.stringify({ type: 'audio_start' }));
      audioStartSent = true;
    } catch (err) {
      console.error('PTT start error', err);
      isPttActive = false;
      const msg = err.name === 'NotAllowedError' ? '⚠️ Mic permission denied'
                : err.name === 'NotFoundError'   ? '⚠️ No microphone found'
                : '⚠️ Mic unavailable';
      showPttError(msg);
      if (sourceNode)   { sourceNode.disconnect();   sourceNode = null; }
      if (workletNode)  { workletNode.disconnect();   workletNode = null; }
      if (audioContext) { audioContext.close();       audioContext = null; }
      if (mediaStream)  { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    }
  }

  function stopPtt() {
    if (!isPttActive) return;
    isPttActive = false;

    if (audioStartSent && wsReady && ws) {
      ws.send(JSON.stringify({ type: 'audio_end' }));
      audioStartSent = false;
    }

    if (sourceNode)   { sourceNode.disconnect();   sourceNode = null; }
    if (workletNode)  { workletNode.disconnect();   workletNode = null; }
    if (audioContext) { audioContext.close();       audioContext = null; }
    if (mediaStream)  { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }

    if (!isAiBusy) {
      pttBtn.className = '';
      pttHint.textContent = 'Hold to talk';
    }
  }

  pttBtn.addEventListener('touchstart', e => { e.preventDefault(); startPtt(); }, { passive: false });
  pttBtn.addEventListener('touchend',   e => { e.preventDefault(); stopPtt();  }, { passive: false });
  pttBtn.addEventListener('touchcancel',e => { e.preventDefault(); stopPtt();  }, { passive: false });

  pttBtn.addEventListener('mousedown', startPtt);
  pttBtn.addEventListener('mouseup',   stopPtt);
  pttBtn.addEventListener('mouseleave',stopPtt);

  // ── Start ─────────────────────────────────────────────────────────────────
  connect();
})();
</script>
</body>
</html>
