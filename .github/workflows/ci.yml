name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Squad.SDK/package-lock.json

      - name: Restore dependencies
        run: dotnet restore squad-dash.slnx

      - name: Build
        run: dotnet build squad-dash.slnx --no-incremental --no-restore

      - name: Test
        run: dotnet test SquadDash.Tests/SquadDash.Tests.csproj --no-build --verbosity normal
